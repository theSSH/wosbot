name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test (JDK 21)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with Git LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and run tests
        run: mvn --batch-mode --no-transfer-progress clean install

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frostguard-desktop-bundle
          path: |
            fg-app/target/frostguard-*.jar
            fg-app/target/frostguard-*-desktop-bundle.zip
          if-no-files-found: ignore
          retention-days: 7

      - name: Publish test report summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: "**/target/surefire-reports/*.xml"
          if-no-files-found: ignore
          retention-days: 7
